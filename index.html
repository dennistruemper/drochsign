<!doctype html>
<html lang="en" data-theme="paper" data-layout="landing">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drochsign — two-color CSS</title>
    <link rel="stylesheet" href="drochsign.css" />
    <link rel="stylesheet" href="docs.css" />
  </head>
  <body>
    <header>
      <strong>Drochsign</strong>
      <select id="theme-switcher" aria-label="Choose theme">
        <optgroup label="Neutral">
          <option value="paper">Paper</option>
          <option value="ink">Ink</option>
          <option value="sepia">Sepia</option>
          <option value="slate">Slate</option>
        </optgroup>
        <optgroup label="Colorful">
          <option value="citrus">Citrus</option>
          <option value="ocean">Ocean</option>
          <option value="rose">Rose</option>
          <option value="forest">Forest</option>
          <option value="sunset">Sunset</option>
          <option value="electric">Electric</option>
          <option value="coral">Coral</option>
          <option value="lime">Lime</option>
          <option value="gamegirl">Game Girl</option>
        </optgroup>
      </select>
    </header>

    <main>
      <section>
        <h1>Two colors. That's it.</h1>
        <p>
          <small>
            Drochsign — background and foreground only. Like paper and print.
          </small>
        </p>
        <div class="landing-actions">
          <a href="docs/index.html">Documentation</a>
          <a href="docs/theme-editor.html">Theme editor</a>
          <a href="example.html">Playground</a>
        </div>
      </section>

      <section>
        <p>
          <small
            >Works with plain HTML — drop into Elm, Foldkit, or any static
            site.</small
          >
        </p>
      </section>
    </main>

    <script src="js/themes.js"></script>
  </body>
</html>
